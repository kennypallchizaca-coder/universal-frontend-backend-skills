<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="380" viewBox="0 0 1400 380" role="img" aria-labelledby="title desc">
  <title id="title">Universal Full-Stack Skills Lifecycle</title>
  <desc id="desc">Workflow showing how source concepts become portable skills, resources, validated documentation, and AI-assisted implementation guidance.</desc>
  <defs>
    <linearGradient id="workflowBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#f4f8f1"/>
    </linearGradient>
    <filter id="workflowShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1400" height="380" rx="28" fill="url(#workflowBg)"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="700" y="72" text-anchor="middle" font-size="38" font-weight="800" fill="#0f172a">Skill Lifecycle</text>
    <text x="700" y="106" text-anchor="middle" font-size="18" fill="#475569">A clean path from concept material to portable, validated guidance for real projects</text>

    <line x1="242" y1="208" x2="350" y2="208" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="512" y1="208" x2="620" y2="208" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="782" y1="208" x2="890" y2="208" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="1052" y1="208" x2="1160" y2="208" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>

    <g>
      <rect x="80" y="148" width="162" height="120" rx="26" fill="#dbeafe" filter="url(#workflowShadow)"/>
      <circle cx="116" cy="184" r="18" fill="#2563eb"/>
      <text x="116" y="190" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">1</text>
      <text x="161" y="188" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Concepts</text>
      <text x="161" y="216" text-anchor="middle" font-size="15" fill="#475569">Source material and</text>
      <text x="161" y="238" text-anchor="middle" font-size="15" fill="#475569">domain expectations</text>
    </g>

    <g>
      <rect x="350" y="148" width="162" height="120" rx="26" fill="#e0f2fe" filter="url(#workflowShadow)"/>
      <circle cx="386" cy="184" r="18" fill="#0284c7"/>
      <text x="386" y="190" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">2</text>
      <text x="431" y="188" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Rewrite</text>
      <text x="431" y="216" text-anchor="middle" font-size="15" fill="#475569">Portable bilingual</text>
      <text x="431" y="238" text-anchor="middle" font-size="15" fill="#475569">`SKILL.md` guides</text>
    </g>

    <g>
      <rect x="620" y="148" width="162" height="120" rx="26" fill="#dcfce7" filter="url(#workflowShadow)"/>
      <circle cx="656" cy="184" r="18" fill="#16a34a"/>
      <text x="656" y="190" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">3</text>
      <text x="701" y="188" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Resources</text>
      <text x="701" y="216" text-anchor="middle" font-size="15" fill="#475569">Templates, matrices,</text>
      <text x="701" y="238" text-anchor="middle" font-size="15" fill="#475569">schemas, checklists</text>
    </g>

    <g>
      <rect x="890" y="148" width="162" height="120" rx="26" fill="#fef3c7" filter="url(#workflowShadow)"/>
      <circle cx="926" cy="184" r="18" fill="#d97706"/>
      <text x="926" y="190" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">4</text>
      <text x="971" y="188" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Validate</text>
      <text x="971" y="216" text-anchor="middle" font-size="15" fill="#475569">Structure, links, JSON,</text>
      <text x="971" y="238" text-anchor="middle" font-size="15" fill="#475569">and repo integrity</text>
    </g>

    <g>
      <rect x="1160" y="148" width="162" height="120" rx="26" fill="#e2e8f0" filter="url(#workflowShadow)"/>
      <circle cx="1196" cy="184" r="18" fill="#0f172a"/>
      <text x="1196" y="190" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">5</text>
      <text x="1241" y="188" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a">Use</text>
      <text x="1241" y="216" text-anchor="middle" font-size="15" fill="#475569">AI assistants apply the</text>
      <text x="1241" y="238" text-anchor="middle" font-size="15" fill="#475569">selected skill in projects</text>
    </g>

    <rect x="394" y="304" width="612" height="40" rx="20" fill="#0f172a"/>
    <text x="700" y="330" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Portable patterns, traceable sources, validator-backed publication quality</text>
  </g>
</svg>
